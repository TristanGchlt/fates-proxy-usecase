### DATA CONFIG
# Data preparation
protected_feature : sex
target_feature : income
split_random_seed : 1
test_size : 0.2
# Data fairness
f_split_strategy : random # Strategies : random, stratified
f_balance : none # Balances : none, undersampling / Plus tard on pourrait ajouter oversampling et smote
f_balance_seed : 1

### MODEL CONFIG
model_name : RFC_Baseline
model_type : "Random Forest Classifier"
model_hyperparameters :
  n_estimators : 100
  max_depth : 10
  random_state : 1

### EVAL CONFIG
metrics : 
  - accuracy
  - f1_score
  - demographic_parity
  - equalized_odds

### TO PRODUCTION
prod : False